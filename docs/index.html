<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Battle Class — Vestibular RPG</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Battle Class — Documentação do Projeto G6 | Arquitetura e Desenho de Software | UnB/FGA 2026.1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
  <style>
    body .markdown-section .table-wrap { width: 100% !important; display: block !important; }
    body .markdown-section table { width: 100% !important; }
  </style>
</head>
<body>
  <div id="bc-topbar">
    <div id="bc-topbar-left">
      <button id="bc-hamburger" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
      <span id="bc-topbar-title"><i class="fa-solid fa-khanda"></i> Battle Class</span>
    </div>
    <div id="bc-topbar-right">UnB/FGA · G6 · 2026.1</div>
  </div>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '<i class="fa-solid fa-khanda"></i> Battle Class',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3,
      },
      themeColor: '#2B6BE6',
      plugins: [
        function(hook) {
hook.doneEach(function() {
            document.querySelectorAll('.table-wrap, table').forEach(function(el) {
              el.style.setProperty('width', '100%', 'important');
              el.style.setProperty('max-width', '100%', 'important');
            });

            var currentPath = decodeURIComponent(location.hash.replace(/^#\//, '').split('?')[0]);

            document.querySelectorAll('.sidebar-nav li').forEach(function(li) {
              var ul = li.querySelector(':scope > ul');
              var a = li.querySelector(':scope > a');
              if (!ul || !a) return;
              var href = a.getAttribute('href') || '';
              if (href.startsWith('#')) return;

              var toggle = a.querySelector('.bc-toggle');
              if (!toggle) {
                toggle = document.createElement('span');
                toggle.className = 'bc-toggle';
                a.appendChild(toggle);
                toggle.addEventListener('click', function(e) {
                  e.preventDefault(); e.stopPropagation();
                  var closed = ul.style.display === 'none';
                  ul.style.display = closed ? '' : 'none';
                  toggle.textContent = closed ? '▾' : '▸';
                });
                a.addEventListener('click', function() {
                  var closed = ul.style.display === 'none';
                  ul.style.display = closed ? '' : 'none';
                  toggle.textContent = closed ? '▾' : '▸';
                });
              }

              var hasMatch = Array.from(ul.querySelectorAll('a')).some(function(link) {
                var h = decodeURIComponent((link.getAttribute('href') || '')).replace(/^#\//, '').replace(/^\//, '').split('?')[0];
                return h === currentPath;
              });
              ul.style.display = hasMatch ? '' : 'none';
              toggle.textContent = hasMatch ? '▾' : '▸';
            });


          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <script>
    (function() {
      var MOBILE = 768;

      function isMobile() { return window.innerWidth <= MOBILE; }

      function openSidebar() {
        document.body.classList.add('bc-sidebar-open');
        document.body.classList.remove('bc-sidebar-closed');
        document.getElementById('bc-hamburger').querySelector('i').className = 'fa-solid fa-xmark';
      }

      function closeSidebar() {
        document.body.classList.remove('bc-sidebar-open');
        document.body.classList.add('bc-sidebar-closed');
        document.getElementById('bc-hamburger').querySelector('i').className = 'fa-solid fa-bars';
      }

      function toggleSidebar() {
        if (document.body.classList.contains('bc-sidebar-closed')) openSidebar();
        else closeSidebar();
      }

      // Estado inicial
      if (isMobile()) closeSidebar();

      document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('bc-hamburger').addEventListener('click', toggleSidebar);
      });

      // Fecha no mobile ao clicar em link da sidebar
      document.addEventListener('click', function(e) {
        if (isMobile() && e.target.closest('.sidebar-nav a')) closeSidebar();
      });

      // Ajusta ao redimensionar
      window.addEventListener('resize', function() {
        if (!isMobile()) {
          document.body.classList.remove('bc-sidebar-closed', 'bc-sidebar-open');
          document.getElementById('bc-hamburger').querySelector('i').className = 'fa-solid fa-bars';
        } else if (!document.body.classList.contains('bc-sidebar-open')) {
          closeSidebar();
        }
      });
    })();
  </script>
</body>
</html>
