<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Battle Class — Vestibular RPG</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Battle Class — Documentação do Projeto G6 | Arquitetura e Desenho de Software | UnB/FGA 2026.1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
  <style>
    body .markdown-section .table-wrap { width: 100% !important; display: block !important; }
    body .markdown-section table { width: 100% !important; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '<i class="fa-solid fa-khanda"></i> Battle Class',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 0,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3,
      },
      themeColor: '#2B6BE6',
      plugins: [
        function(hook) {
hook.doneEach(function() {
            document.querySelectorAll('.table-wrap, table').forEach(function(el) {
              el.style.setProperty('width', '100%', 'important');
              el.style.setProperty('max-width', '100%', 'important');
            });

            var id = (location.href.match(/[?&]id=([^&]+)/) || [])[1];
            if (id) {
              var target = document.getElementById(decodeURIComponent(id));
              if (target) {
                target.classList.remove('bc-anchor-highlight');
                void target.offsetWidth;
                target.classList.add('bc-anchor-highlight');
              }
            }

            document.querySelectorAll('.sidebar-nav li').forEach(function(li) {
              var ul = li.querySelector(':scope > ul');
              var a = li.querySelector(':scope > a');
              if (!ul || !a) return;
              if (li.dataset.collapseInit) return;
              li.dataset.collapseInit = '1';

              var toggle = document.createElement('span');
              toggle.className = 'bc-toggle';
              toggle.textContent = '▾';
              a.appendChild(toggle);

              function doToggle() {
                var collapsed = ul.style.display === 'none';
                ul.style.display = collapsed ? '' : 'none';
                toggle.textContent = collapsed ? '▾' : '▸';
              }

              toggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                doToggle();
              });

              a.addEventListener('click', function() {
                doToggle();
              });
            });
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
