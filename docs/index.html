<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Battle Class — Vestibular RPG</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Battle Class — Documentação do Projeto G6 | Arquitetura e Desenho de Software | UnB/FGA 2026.1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="custom.css">
  <style>
    body .markdown-section .table-wrap { width: 100% !important; display: block !important; }
    body .markdown-section table { width: 100% !important; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3,
      },
      themeColor: '#2B6BE6',
      plugins: [
        function(hook) {
          hook.doneEach(function() {
          document.querySelectorAll('.table-wrap, table').forEach(function(el) {
            el.style.setProperty('width', '100%', 'important');
            el.style.setProperty('max-width', '100%', 'important');
          });
        });
        hook.mounted(function() {
            // Injeta o header fixo no topo
            var header = document.createElement('header');
            header.id = 'bc-header';
            header.innerHTML = `
              <button id="bc-hamburger" aria-label="Menu" onclick="document.body.classList.toggle('close')">
                <span></span><span></span><span></span>
              </button>
              <a href="/" class="bc-logo">
                <i class="fa-solid fa-khanda"></i> <span>Battle Class</span>
              </a>
              <div class="bc-meta">UnB/FGA &bull; 2026.1 &bull; G6</div>
            `;
            document.body.prepend(header);
          });
        }
      ]
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
